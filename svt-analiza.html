<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>SVT Analiza | Energy Navigator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    :root{--g:#07943f;--navy:#071826;--muted:#64748b;--border:#dce5ef;--bg:#f8fafc}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:Inter,system-ui,sans-serif;color:var(--navy)}.shell{width:min(1120px,calc(100% - 40px));margin:0 auto;padding:28px 0 50px}.top{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:18px}.btn{height:44px;padding:0 18px;border-radius:11px;border:1px solid var(--border);background:#fff;color:var(--navy);font-weight:900;text-decoration:none;display:inline-flex;align-items:center;gap:8px}.btn.green{background:linear-gradient(135deg,#07943f,#05aa48);color:#fff;border:0}.hero{background:#fff;border:1px solid var(--border);border-radius:24px;padding:26px 30px;margin-bottom:16px;box-shadow:0 14px 40px rgba(15,23,42,.05)}.hero h1{margin:0;font-size:34px;letter-spacing:-.05em}.hero p{color:var(--muted);line-height:1.5}.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:16px}.metric,.card{background:#fff;border:1px solid var(--border);border-radius:22px;padding:18px;box-shadow:0 12px 35px rgba(15,23,42,.04)}.metric strong{display:block;font-size:26px;letter-spacing:-.04em}.metric small{color:var(--muted);font-size:12px}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}.chart{height:280px}.findings{display:grid;gap:10px}.finding{border:1px solid #e8eef5;border-radius:14px;padding:13px}.finding strong{display:block}.finding span{display:block;color:var(--muted);font-size:13px;margin-top:4px;line-height:1.45}@media(max-width:850px){.metrics,.grid2{grid-template-columns:1fr}.chart{height:230px}}
  </style>
</head>
<body>
  <main class="shell">
    <div class="top">
      <a class="btn" href="./incarcare-curba-sarcina.html">← Încarcă alt fișier</a>
      <button class="btn green" onclick="window.print()">Salvează PDF</button>
    </div>
    <section class="hero">
      <h1>Când consum energie scumpă din rețea?</h1>
      <p id="summary">Se încarcă analiza...</p>
    </section>
    <section class="metrics">
      <div class="metric"><strong id="mEnergy">-</strong><small>energie analizată</small></div>
      <div class="metric"><strong id="mCost">-</strong><small>cost estimat</small></div>
      <div class="metric"><strong id="mSaving">-</strong><small>economie posibilă</small></div>
      <div class="metric"><strong id="mPeak">-</strong><small>vârf estimat</small></div>
    </section>
    <section class="grid2">
      <div class="card"><h2>Curba de sarcină</h2><div class="chart"><canvas id="loadChart"></canvas></div></div>
      <div class="card"><h2>Cost pe ore</h2><div class="chart"><canvas id="hourChart"></canvas></div></div>
    </section>
    <section class="card" style="margin-top:16px"><h2>Intervale scumpe detectate</h2><div id="findings" class="findings"></div></section>
    <section class="card" style="margin-top:16px"><h2>Recomandări</h2><div id="recs" class="findings"></div></section>
  </main>
  <script src="./assets/js/svt-analysis-engine.js"></script>
  <script>
    const analysis = JSON.parse(sessionStorage.getItem('svtAnalysis') || 'null');
    const dataset = JSON.parse(sessionStorage.getItem('svtDataset') || 'null');
    if (!analysis || !dataset) {
      document.getElementById('summary').innerHTML = 'Nu există date analizate. <a href="./incarcare-curba-sarcina.html">Încarcă un fișier</a>.';
    } else {
      const t=analysis.totals, meta=analysis.meta||dataset.meta||{};
      summary.textContent = `Fișier: ${meta.fileName || '-'} · profil detectat: ${meta.sourceProfile || '-'} · ${meta.rowsCount || dataset.rows.length} intervale · ${meta.intervalMinutes || '-'} min · unitate sursă: ${meta.unit || 'kWh'}.`;
      mEnergy.textContent = fmt(t.electricKwh,0)+' kWh';
      mCost.textContent = fmt(t.fixedCostRon,0)+' RON';
      mSaving.textContent = fmt(t.totalPossibleSavingRon,0)+' RON';
      mPeak.textContent = fmt(t.maxDemandKw,1)+' kW';
      const curve = (analysis.charts.loadCurve || []).filter((_,i)=>i%Math.max(1,Math.ceil((analysis.charts.loadCurve||[]).length/160))===0);
      new Chart(loadChart,{type:'line',data:{labels:curve.map(x=>x.label),datasets:[{label:'kWh',data:curve.map(x=>x.electricKwh),borderColor:'#07943f',backgroundColor:'rgba(7,148,63,.12)',fill:true,tension:.28,pointRadius:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{maxTicksLimit:8}},y:{beginAtZero:true}}}});
      new Chart(hourChart,{type:'bar',data:{labels:(analysis.charts.costByHour||[]).map(x=>String(x.hour).padStart(2,'0')),datasets:[{label:'RON',data:(analysis.charts.costByHour||[]).map(x=>x.cost),backgroundColor:'rgba(7,148,63,.72)',borderRadius:6}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true}}}});
      findings.innerHTML = (analysis.expensiveIntervals||[]).slice(0,8).map(x=>`<div class="finding"><strong>${x.localLabel} · ${fmt(x.kwh,2)} kWh · ${fmt(x.price,3)} RON/kWh</strong><span>Cost estimat: ${fmt(x.cost,2)} RON. Este un interval prioritar pentru mutare/eșalonare consum.</span></div>`).join('');
      recs.innerHTML = (analysis.recommendations||[]).map(r=>`<div class="finding"><strong>${r.title}</strong><span>${r.body}<br><b>Economie estimată:</b> ${fmt(r.savingRon,0)} RON · ${r.difficulty}</span></div>`).join('');
    }
    function fmt(v,d=0){return (Number(v)||0).toLocaleString('ro-RO',{maximumFractionDigits:d,minimumFractionDigits:d});}
  </script>
</body>
</html>
