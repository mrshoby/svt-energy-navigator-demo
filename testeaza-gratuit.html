<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Întrebări disponibile | SVT Energy Navigator</title>
  <meta name="description" content="Alege întrebarea care poate fi răspunsă pe baza datelor încărcate."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    :root{
      --green:#07943f;--green2:#05aa48;--soft:#e8f6ed;--navy:#071826;--text:#10203d;
      --muted:#66758f;--border:#dce5ef;--shadow:0 14px 34px rgba(15,23,42,.06);
      --red:#dc2626;--blue:#2563eb;--orange:#f59e0b;
    }
    *{box-sizing:border-box}
    body{
      margin:0;min-height:100vh;
      background:radial-gradient(circle at 78% 18%,rgba(7,148,63,.06),transparent 26%),linear-gradient(180deg,#fff 0%,#fbfdfc 100%);
      font-family:Inter,system-ui,-apple-system,"Segoe UI",sans-serif;color:var(--text);overflow-x:hidden;
    }
    body::after{
      content:"";position:fixed;left:-80px;right:-80px;bottom:-90px;height:210px;pointer-events:none;opacity:.18;
      background:repeating-radial-gradient(ellipse at center,rgba(7,148,63,.30) 0 1px,transparent 1px 9px);
      mask-image:linear-gradient(to top,#000,transparent 78%);transform:skewY(-3deg);z-index:0;
    }
    .shell{
      position:relative;z-index:1;width:min(1040px,calc(100% - 72px));min-height:100vh;margin:0 auto;
      padding:42px 0 34px;display:grid;gap:14px;
    }
    .kicker{margin:0 0 12px;color:var(--green);font-size:14px;letter-spacing:.13em;text-transform:uppercase;font-weight:1000}
    h1{margin:0;color:var(--navy);font-size:clamp(34px,3.15vw,52px);line-height:1;letter-spacing:-.055em;font-weight:1000;white-space:nowrap;overflow:hidden}
    .subtitle{margin:7px 0 0;color:var(--muted);font-size:18px;line-height:1.25;font-weight:550}
    .context{margin-top:8px;display:flex;flex-wrap:wrap;gap:8px;align-items:center}
    .pill{height:32px;padding:0 12px;border-radius:999px;border:1px solid #dceee2;background:#f6faf8;color:#0b6f37;font-size:12px;font-weight:900;display:inline-flex;align-items:center}
    .questions{display:grid;grid-template-columns:1fr;gap:12px;margin-top:12px}
    .q-item{display:block;width:100%}
    .q-card{position:relative;width:100%;height:72px;min-height:72px;padding:12px 150px 12px 82px;border:1px solid #e0e8f1;border-radius:16px;
      background:rgba(255,255,255,.95);box-shadow:var(--shadow);display:flex;align-items:center;text-align:left;color:var(--navy);overflow:hidden;
      transition:.18s ease;border-color:.18s ease;cursor:not-allowed;
    }
    .q-card.available{
      border-color:var(--green);background:linear-gradient(135deg,rgba(7,148,63,.075),rgba(255,255,255,.98));
      box-shadow:0 16px 40px rgba(7,148,63,.12);cursor:pointer;
    }
    .q-card.available:hover{transform:translateY(-1px)}
    .q-no{
      position:absolute;left:22px;top:50%;transform:translateY(-50%);width:42px;height:42px;border-radius:999px;display:grid;place-items:center;
      background:#fff;border:1px solid #e1e9f2;color:var(--green);font-size:14px;font-weight:1000;font-variant-numeric:tabular-nums;
    }
    .q-ico{display:none!important}
    .q-title{
      display:block;font-size:17px;line-height:1;letter-spacing:-.018em;font-weight:950;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;
    }
    .badge{
      position:absolute;right:22px;top:50%;transform:translateY(-50%);height:28px;padding:0 12px;border-radius:999px;display:inline-flex;align-items:center;justify-content:center;
      background:#eef8f1;border:1px solid #cfeadb;color:var(--green);font-size:11px;line-height:1;font-weight:1000;white-space:nowrap;
    }
    .answer-slot{
      position:absolute;right:26px;top:50%;transform:translateY(-50%);width:34px;height:34px;border-radius:999px;border:2px solid #c8d5e4;background:#fff;display:grid;place-items:center;color:transparent;font-size:17px;font-weight:1000;
      box-shadow:0 8px 18px rgba(15,23,42,.045);
    }
    .q-card.done .answer-slot{background:var(--green);border-color:var(--green);color:#fff}
    .q-card.loading .answer-slot{border-color:var(--green);border-top-color:transparent;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:translateY(-50%) rotate(360deg)}}
    .details{
      display:none;margin:10px 0 4px;border:1px solid #dfe8f1;background:#fff;border-radius:18px;padding:18px 18px 16px;box-shadow:0 12px 28px rgba(15,23,42,.05);
      animation:drop .28s ease both;transform-origin:top;
    }
    .details.open{display:block}
    @keyframes drop{from{opacity:0;transform:scaleY(.94) translateY(-8px)}to{opacity:1;transform:scaleY(1) translateY(0)}}
    .loading-panel{display:grid;place-items:center;min-height:180px;color:var(--muted);font-weight:800;gap:12px}
    .spinner{width:38px;height:38px;border-radius:999px;border:4px solid #dbe8df;border-top-color:var(--green);animation:spin2 .85s linear infinite}
    @keyframes spin2{to{transform:rotate(360deg)}}
    .result-head{display:flex;justify-content:space-between;gap:14px;align-items:flex-start;margin-bottom:10px}
    .result-head h2{margin:0;color:var(--navy);font-size:22px;letter-spacing:-.03em}
    .result-head p{margin:6px 0 0;color:var(--muted);font-size:13px;line-height:1.4;font-weight:650}
    .answer-summary{
      display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin:12px 0 12px;
    }
    .summary-card{
      border:1px solid #e4ebf2;border-radius:14px;background:#fbfcfe;padding:12px 13px;
    }
    .summary-card strong{
      display:block;color:var(--navy);font-size:17px;line-height:1.05;font-weight:1000;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    }
    .summary-card span{
      display:block;margin-top:5px;color:var(--muted);font-size:11.5px;line-height:1.3;font-weight:750;
    }
    @media(max-width:760px){.answer-summary{grid-template-columns:1fr}}

    .chart-wrap{height:360px;position:relative;border:1px solid #eef2f6;border-radius:16px;padding:12px;background:#fbfcfe}
    .top-list{margin-top:14px;display:grid;gap:8px}
    .top-row{display:grid;grid-template-columns:38px 1fr auto;gap:10px;align-items:center;border:1px solid #e7edf4;border-radius:12px;padding:10px 12px;background:#fff}
    .rank{width:30px;height:30px;border-radius:999px;background:#fee2e2;color:#b91c1c;display:grid;place-items:center;font-size:12px;font-weight:1000}
    .top-row strong{display:block;font-size:14px;color:var(--navy)}
    .top-row small{display:block;font-size:12px;color:var(--muted);margin-top:3px}
    .cost{font-weight:1000;color:#b91c1c;white-space:nowrap}
    .info{margin-top:6px;border:1px solid #dfe8f1;background:#fff;border-radius:15px;padding:12px 14px;color:#5d6f89;font-size:13px;line-height:1.45;font-weight:650}
    .bottom{margin-top:6px;padding-top:16px;border-top:1px solid #e4ebf2;display:flex;justify-content:space-between;align-items:center;gap:18px}
    .btn{width:210px;min-width:210px;height:50px;border-radius:12px;border:1px solid var(--border);display:inline-flex;align-items:center;justify-content:center;gap:10px;font-size:15px;line-height:1;font-weight:1000;text-decoration:none;cursor:pointer;font-family:inherit}
    .btn.back{color:var(--navy);background:#fff;box-shadow:0 10px 24px rgba(15,23,42,.045)}
    .btn.next{color:#fff;border-color:transparent;background:linear-gradient(135deg,var(--green),var(--green2));box-shadow:0 14px 30px rgba(7,148,63,.18)}
    @media(max-width:760px){
      .shell{width:calc(100% - 28px)}
      h1{white-space:normal}
      .q-card{height:auto;min-height:78px;padding:12px 82px 12px 72px}
      .q-title{font-size:14px;line-height:1.2;white-space:normal}
      .q-no{left:16px}.q-ico{display:none!important}
      .badge{right:14px}.answer-slot{right:18px}
      .chart-wrap{height:300px}
      .bottom{flex-direction:column-reverse;align-items:stretch}.btn{width:100%;min-width:0}
    }
  
    /* v44: narrower question cards and adaptive one-line text */
    .questions{
      max-width:880px !important;
      margin-left:auto !important;
      margin-right:auto !important;
      gap:9px !important;
    }
    .q-card{
      height:60px !important;
      min-height:60px !important;
      padding:10px 132px 10px 76px !important;
      border-radius:14px !important;
    }
    .q-no{
      left:18px !important;
      width:36px !important;
      height:36px !important;
      font-size:13px !important;
    }
    .q-title{
      font-size:15px !important;
      white-space:nowrap !important;
      overflow:hidden !important;
      text-overflow:ellipsis !important;
      line-height:1 !important;
    }
    .q-card.is-long .q-title{font-size:13.2px !important;letter-spacing:-.025em !important}
    .q-card.is-xlong .q-title{font-size:12px !important;letter-spacing:-.035em !important}
    .badge{right:18px !important;height:24px !important;font-size:10px !important}
    .answer-slot{right:22px !important;width:30px !important;height:30px !important}
    @media(max-width:760px){
      .questions{max-width:100% !important}
      .q-card{height:auto !important;min-height:68px !important;padding:10px 78px 10px 70px !important}
      .q-title{font-size:13.5px !important;white-space:normal !important;line-height:1.18 !important}
      .q-card.is-long .q-title,.q-card.is-xlong .q-title{font-size:12.8px !important}
    }

  </style>
</head>
<body>
  <main class="shell">
    <section aria-labelledby="trialTitle">
      <p class="kicker">SVT ENERGY NAVIGATOR</p>
      <h1 id="trialTitle">Alege întrebarea care te interesează cel mai mult</h1>
      
    </section>

    <section class="questions" id="questions" aria-label="Întrebări disponibile"></section>

    <footer class="bottom">
      <a class="btn back" href="./incarcare-curba-sarcina.html">← Înapoi la date</a>
      <button class="btn next" type="button" id="continueBtn">Continuă ›</button>
    </footer>
  </main>

  <script>
    const allQuestions = [
      {id:1, icon:'📈', title:'Când consum din rețea energie scumpă?', groups:['electric'], active:true},
      {id:2, icon:'☀️', title:'Când nu valorific optim energia produsă local?', groups:['electric','pv']},
      {id:3, icon:'🌤️', title:'Cât va produce estimativ sistemul meu în următoarele 24 ore?', groups:['electric','pv','forecast']},
      {id:4, icon:'➕', title:'Câtă energie ar mai putea fi produsă local?', groups:['electric','pv','site']},
      {id:5, icon:'🔁', title:'Cât din energia suplimentar produsă ar fi utilizabilă util?', groups:['electric','pv']},
      {id:6, icon:'⏱️', title:'Ce consumuri aș putea muta în timp pentru că procesul tehnologic permite?', groups:['electric','thermal','flex']},
      {id:7, icon:'🔋', title:'Ce economie aș obține cu BESS, pompă de căldură, boiler, puffer sau cogenerare?', groups:['electric','thermal','investment']},
      {id:8, icon:'📊', title:'Ce economie aș obține astăzi pe consumurile reale dacă aș avea tarif dinamic PZU?', groups:['electric','pzu']},
      {id:9, icon:'🏗️', title:'Cât m-ar costa o investiție integrată care reduce costurile electrice și termice?', groups:['electric','thermal','investment']},
      {id:10, icon:'🎯', title:'Ce ar trebui să fac mâine pentru a reduce costul?', groups:['electric','thermal','forecast']}
    ];
    let activeCharts = {};

    function getContext(){
      try { return JSON.parse(sessionStorage.getItem('svtNavigatorContext') || localStorage.getItem('svtNavigatorContext') || '{}'); }
      catch(e){ return {}; }
    }
    function getAnalysis(){
      try { return JSON.parse(sessionStorage.getItem('svtAnalysis') || '{}'); }
      catch(e){ return {}; }
    }
    function relevantQuestions(ctx){
      const mode = ctx.selectedMode || 'electric';
      if(mode === 'termic') return allQuestions.filter(q => q.groups.includes('thermal'));
      return allQuestions.filter(q => q.groups.includes('electric'));
    }
    function displayNumber(i){ return String(i + 1).padStart(2,'0'); }
    function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));}
    function fmt(v,d=2){return (Number(v)||0).toLocaleString('ro-RO',{maximumFractionDigits:d,minimumFractionDigits:d});}

    function render(){
      const ctx = getContext();
      const mode = ctx.selectedMode || 'electric';
      const analysis = getAnalysis();
      const questions = relevantQuestions(ctx);
      const grid = document.getElementById('questions');

      const modeLabel = mode === 'termic' ? 'Termic' : 'Electric';
      const dataLabel = mode === 'termic'
        ? (ctx.thermal?.annualValue ? `Consum termic: ${ctx.thermal.annualValue} ${ctx.thermal.unit || ''}` : 'Date termice de bază')
        : (ctx.hasHourlyFile ? 'Curba orară încărcată' : ctx.hasInvoiceOnly ? 'Factură lunară / estimare' : 'Date electrice');
      const prodLabel = ctx.hasProduction ? 'Producție locală inclusă' : 'Fără producție locală';

      grid.innerHTML = questions.map((q, idx) => {
        const hasPvData = !!(ctx.hasProduction || analysis?.meta?.hasProduction || (analysis?.chartRows || []).some(r => Number(r.productionKwh || 0) > 0));
        const isActive = mode === 'electric' && analysis?.chartRows?.length && (q.id === 1 || (q.id === 2 && hasPvData));
        return `
          <div class="q-item" data-q-item="${q.id}">
            <button class="q-card ${q.title.length > 92 ? 'is-xlong' : q.title.length > 64 ? 'is-long' : ''} ${isActive ? 'available' : 'soon'}" type="button" data-q="${q.id}" ${isActive ? '' : 'disabled'}>
              <span class="q-no">${displayNumber(idx)}</span>
              <span class="q-title">${esc(q.title)}</span>
              ${isActive ? '<span class="answer-slot" title="Aici apare bifa după răspuns">✓</span>' : '<span class="badge">În curând</span>'}
            </button>
            ${isActive ? `<div class="details" id="details-q${q.id}"></div>` : ''}
          </div>
        `;
      }).join('');

      document.querySelectorAll('.q-card.available').forEach(card => {
        card.addEventListener('click', () => {
          const q = Number(card.getAttribute('data-q'));
          if(q === 1) handleQuestion1(card);
          if(q === 2) handleQuestion2(card);
        });
      });
    }

    function handleQuestion1(cardArg){
      const card = cardArg || document.querySelector('.q-card.available[data-q="1"]');
      const box = document.getElementById('details-q1');
      const analysis = getAnalysis();
      if(!box || !analysis?.chartRows?.length) return;

      card.classList.add('loading');
      card.classList.remove('done');
      box.classList.add('open');
      box.innerHTML = `
        <div class="loading-panel">
          <div class="spinner"></div>
          <div>Se analizează datele încărcate și se calculează consumul scump din rețea...</div>
        </div>
      `;

      window.setTimeout(() => {
        renderQuestion1Result(box, analysis);
        card.classList.remove('loading');
        card.classList.add('done');
      }, 850);
    }

    function renderQuestion1Result(box, data){
      const ctx = getContext();
      const rows = data.chartRows || [];
      const step = Math.max(1, Math.ceil(rows.length / 280));
      const sampled = rows.filter((_, i) => i % step === 0);
      const hasProd = sampled.some(r => Number(r.productionKwh || 0) > 0);
      const expensive = sampled.map(r => r.isExpensive ? r.gridKwh : null);
      const isInvoice = data.meta?.loadMethod === 'invoice' || ctx.hasInvoiceOnly;

      box.innerHTML = `
        <div class="result-head">
          <div>
            <h2>Când consum din rețea energie scumpă?</h2>
            <p>${isInvoice ? 'Estimare din factura lunară. Pentru răspuns exact, folosește curba orară.' : 'Răspuns calculat din curba încărcată.'} Tarif fix: ${fmt(data.meta?.fixedTariffRonKwh || ctx.fixedTariffRonKwh,3)} lei/kWh.</p>
          </div>
        </div>
        <div class="answer-summary" id="answerSummary"></div>
        <div class="chart-wrap"><canvas id="question1Chart"></canvas></div>
        <div class="top-list" id="topIntervals"></div>
      `;

      const topInterval = (data.expensiveIntervals || [])[0] || {};
      const totals = data.totals || {};
      const summary = document.getElementById('answerSummary');
      if(summary){
        const pvText = hasProd ? `Producție locală: ${fmt(totals.productionKwh || 0)} kWh` : 'Fără producție locală inclusă';
        summary.innerHTML = `
          <div class="summary-card"><strong>${esc(topInterval.localLabel || '-')}</strong><span>intervalul cu cel mai mare cost</span></div>
          <div class="summary-card"><strong>${fmt(topInterval.gridCostRon || 0)} lei</strong><span>cost în acel interval</span></div>
          <div class="summary-card"><strong>${fmt(totals.gridKwh || 0)} kWh</strong><span>consum total din rețea · ${pvText}</span></div>
        `;
      }

      const datasets = [
        {label:'Consum total',data:sampled.map(r=>r.consumptionKwh),borderColor:'#94a3b8',backgroundColor:'rgba(148,163,184,.08)',fill:false,tension:.28,pointRadius:0,borderWidth:1.8},
        {label:'Consum din rețea',data:sampled.map(r=>r.gridKwh),borderColor:'#07943f',backgroundColor:'rgba(7,148,63,.13)',fill:true,tension:.28,pointRadius:0,borderWidth:2.4},
        {label:'Puncte cost ridicat',data:expensive,borderColor:'#dc2626',backgroundColor:'#dc2626',showLine:false,pointRadius:4,pointHoverRadius:6}
      ];
      if(hasProd) datasets.splice(1,0,{label:'Producție locală',data:sampled.map(r=>r.productionKwh),borderColor:'#2563eb',backgroundColor:'rgba(37,99,235,.08)',fill:false,tension:.28,pointRadius:0,borderWidth:2});

      if(activeCharts.q1) activeCharts.q1.destroy();
      activeCharts.q1 = new Chart(document.getElementById('question1Chart'), {
        type:'line',
        data:{labels:sampled.map(r=>r.label), datasets},
        options:{
          responsive:true, maintainAspectRatio:false, interaction:{mode:'index',intersect:false},
          plugins:{legend:{position:'bottom'}, tooltip:{callbacks:{label:ctx=>`${ctx.dataset.label}: ${Number(ctx.parsed.y||0).toLocaleString('ro-RO',{maximumFractionDigits:2})} kWh`}}},
          scales:{x:{ticks:{maxTicksLimit:9}}, y:{beginAtZero:true,title:{display:true,text:'kWh / interval'}}}
        }
      });

      const top = (data.expensiveIntervals || []).slice(0,5);
      document.getElementById('topIntervals').innerHTML = top.map(x => `
        <div class="top-row">
          <div class="rank">${x.rank}</div>
          <div><strong>${esc(x.localLabel)}</strong><small>Consum rețea: ${fmt(x.gridKwh)} kWh · tarif fix: ${fmt(x.tariffRonKwh,3)} lei/kWh</small></div>
          <div class="cost">${fmt(x.gridCostRon)} lei</div>
        </div>
      `).join('');
    }

    function handleQuestion2(cardArg){
      const card = cardArg || document.querySelector('.q-card.available[data-q="2"]');
      const box = document.getElementById('details-q2');
      const analysis = getAnalysis();
      if(!box || !analysis?.chartRows?.length) return;

      card.classList.add('loading');
      card.classList.remove('done');
      box.classList.add('open');
      box.innerHTML = `
        <div class="loading-panel">
          <div class="spinner"></div>
          <div>Se analizează producția locală, autoconsumul și surplusul neutilizat...</div>
        </div>
      `;

      window.setTimeout(() => {
        renderQuestion2Result(box, analysis);
        card.classList.remove('loading');
        card.classList.add('done');
      }, 850);
    }

    function renderQuestion2Result(box, data){
      const rows = data.chartRows || [];
      const step = Math.max(1, Math.ceil(rows.length / 280));
      const sampled = rows.filter((_, i) => i % step === 0).map(r => {
        const production = Number(r.productionKwh || 0);
        const consumption = Number(r.consumptionKwh || 0);
        const self = Math.min(production, consumption);
        const surplus = Math.max(production - consumption, Number(r.surplusKwh || 0), 0);
        return {...r, productionKwh:production, selfConsumedKwh:self, surplusKwh:surplus};
      });

      const totals = rows.reduce((acc, r) => {
        const production = Number(r.productionKwh || 0);
        const consumption = Number(r.consumptionKwh || 0);
        const self = Math.min(production, consumption);
        const surplus = Math.max(production - consumption, Number(r.surplusKwh || 0), 0);
        acc.production += production;
        acc.self += self;
        acc.surplus += surplus;
        return acc;
      }, {production:0, self:0, surplus:0});

      const selfRate = totals.production > 0 ? totals.self / totals.production * 100 : 0;
      const topSurplus = rows.slice().map(r => {
        const production = Number(r.productionKwh || 0);
        const consumption = Number(r.consumptionKwh || 0);
        const surplus = Math.max(production - consumption, Number(r.surplusKwh || 0), 0);
        return {...r, surplusKwh:surplus};
      }).filter(r => r.surplusKwh > 0).sort((a,b)=>b.surplusKwh - a.surplusKwh).slice(0,5);

      box.innerHTML = `
        <div class="result-head">
          <div>
            <h2>Când nu valorific optim energia produsă local?</h2>
            <p>Răspuns calculat din consum + producție locală/PV. Zonele cu surplus mare arată când energia produsă nu este consumată local.</p>
          </div>
        </div>
        <div class="answer-summary" id="answerSummaryQ2">
          <div class="summary-card"><strong>${fmt(totals.production)} kWh</strong><span>producție locală totală</span></div>
          <div class="summary-card"><strong>${fmt(totals.self)} kWh</strong><span>energie consumată local</span></div>
          <div class="summary-card"><strong>${fmt(totals.surplus)} kWh</strong><span>surplus / export estimat · autoconsum ${fmt(selfRate,1)}%</span></div>
        </div>
        <div class="chart-wrap"><canvas id="question2Chart"></canvas></div>
        <div class="top-list" id="topSurplusIntervals"></div>
      `;

      if(activeCharts.q2) activeCharts.q2.destroy();
      activeCharts.q2 = new Chart(document.getElementById('question2Chart'), {
        type:'line',
        data:{
          labels:sampled.map(r=>r.label),
          datasets:[
            {label:'Producție locală',data:sampled.map(r=>r.productionKwh),borderColor:'#2563eb',backgroundColor:'rgba(37,99,235,.08)',fill:false,tension:.28,pointRadius:0,borderWidth:2},
            {label:'Autoconsum',data:sampled.map(r=>r.selfConsumedKwh),borderColor:'#07943f',backgroundColor:'rgba(7,148,63,.12)',fill:true,tension:.28,pointRadius:0,borderWidth:2.2},
            {label:'Surplus / export',data:sampled.map(r=>r.surplusKwh),borderColor:'#f59e0b',backgroundColor:'rgba(245,158,11,.12)',fill:true,tension:.28,pointRadius:0,borderWidth:2}
          ]
        },
        options:{
          responsive:true, maintainAspectRatio:false, interaction:{mode:'index',intersect:false},
          plugins:{legend:{position:'bottom'}, tooltip:{callbacks:{label:ctx=>`${ctx.dataset.label}: ${Number(ctx.parsed.y||0).toLocaleString('ro-RO',{maximumFractionDigits:2})} kWh`}}},
          scales:{x:{ticks:{maxTicksLimit:9}}, y:{beginAtZero:true,title:{display:true,text:'kWh / interval'}}}
        }
      });

      const target = document.getElementById('topSurplusIntervals');
      target.innerHTML = topSurplus.length ? topSurplus.map((x, i) => `
        <div class="top-row">
          <div class="rank">${i+1}</div>
          <div><strong>${esc(x.localLabel)}</strong><small>Producție: ${fmt(x.productionKwh)} kWh · consum: ${fmt(x.consumptionKwh)} kWh</small></div>
          <div class="cost" style="color:#b45309">${fmt(x.surplusKwh)} kWh surplus</div>
        </div>
      `).join('') : `
        <div class="top-row">
          <div class="rank">✓</div>
          <div><strong>Nu am detectat surplus local relevant</strong><small>Producția este consumată local în intervalele analizate.</small></div>
          <div class="cost" style="color:#07943f">OK</div>
        </div>
      `;
    }

    // Momentan butonul Continuă nu face nimic.
    document.getElementById('continueBtn')?.addEventListener('click', () => {});
    render();
  </script>
</body>
</html>
