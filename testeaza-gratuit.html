<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Întrebări disponibile | SVT Energy Navigator</title>
  <meta name="description" content="Alege întrebarea care poate fi răspunsă pe baza datelor încărcate."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    :root{--green:#07943f;--green2:#05aa48;--soft:#e8f6ed;--navy:#071826;--text:#10203d;--muted:#66758f;--border:#dce5ef;--shadow:0 14px 34px rgba(15,23,42,.06)}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;background:radial-gradient(circle at 78% 18%,rgba(7,148,63,.06),transparent 26%),linear-gradient(180deg,#fff 0%,#fbfdfc 100%);font-family:Inter,system-ui,-apple-system,"Segoe UI",sans-serif;color:var(--text);overflow-x:hidden}
    body::after{content:"";position:fixed;left:-80px;right:-80px;bottom:-90px;height:210px;pointer-events:none;opacity:.18;background:repeating-radial-gradient(ellipse at center,rgba(7,148,63,.30) 0 1px,transparent 1px 9px);mask-image:linear-gradient(to top,#000,transparent 78%);transform:skewY(-3deg);z-index:0}
    .shell{position:relative;z-index:1;width:min(1180px,calc(100% - 72px));min-height:100vh;margin:0 auto;padding:42px 0 34px;display:grid;gap:12px}
    .kicker{margin:0 0 12px;color:var(--green);font-size:14px;letter-spacing:.13em;text-transform:uppercase;font-weight:1000}
    h1{margin:0;color:var(--navy);font-size:clamp(34px,2.95vw,50px);line-height:1;letter-spacing:-.055em;font-weight:1000;white-space:nowrap;overflow:hidden}
    .subtitle{margin:5px 0 0;color:var(--muted);font-size:17px;line-height:1.25;font-weight:550}
    .context{margin-top:4px;display:flex;flex-wrap:wrap;gap:8px;align-items:center}
    .pill{height:30px;padding:0 11px;border-radius:999px;border:1px solid #dceee2;background:#f6faf8;color:#0b6f37;font-size:12px;font-weight:900;display:inline-flex;align-items:center}
    .questions{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:7px 14px;max-width:1120px;margin-top:4px}
    .q-card{position:relative;height:48px;min-height:48px;width:100%;padding:6px 34px 6px 90px;border:1px solid #e0e8f1;border-radius:11px;background:rgba(255,255,255,.94);box-shadow:var(--shadow);display:flex;align-items:center;text-align:left;color:var(--navy);overflow:hidden}
    .q-card.available{border-color:var(--green);background:linear-gradient(135deg,rgba(7,148,63,.075),rgba(255,255,255,.98));box-shadow:0 12px 30px rgba(7,148,63,.10)}
    .q-card.soon{opacity:.74}
    .q-no{position:absolute;left:13px;top:50%;transform:translateY(-50%);width:28px;height:28px;border-radius:999px;display:grid;place-items:center;background:#fff;border:1px solid #e1e9f2;color:var(--green);font-size:11px;font-weight:1000}
    .q-ico{position:absolute;left:48px;top:50%;transform:translateY(-50%);width:32px;height:32px;border-radius:999px;display:grid;place-items:center;background:var(--soft);color:var(--green);font-size:16px}
    .q-title{display:block;font-size:11.6px;line-height:1;letter-spacing:-.01em;font-weight:950;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .badge{position:absolute;right:32px;top:50%;transform:translateY(-50%);height:18px;padding:0 6px;border-radius:999px;display:inline-flex;align-items:center;justify-content:center;background:#eef8f1;border:1px solid #cfeadb;color:var(--green);font-size:8px;line-height:1;font-weight:1000;white-space:nowrap}
    .check{position:absolute;right:16px;top:50%;transform:translateY(-50%);width:21px;height:21px;border-radius:999px;background:var(--green);color:#fff;display:grid;place-items:center;font-size:12px;font-weight:1000}
    .info{margin-top:8px;border:1px solid #dfe8f1;background:#fff;border-radius:15px;padding:12px 14px;color:#5d6f89;font-size:13px;line-height:1.45;font-weight:650}
    .bottom{margin-top:4px;padding-top:16px;border-top:1px solid #e4ebf2;display:flex;justify-content:space-between;align-items:center;gap:18px}
    .btn{width:210px;min-width:210px;height:50px;border-radius:12px;border:1px solid var(--border);display:inline-flex;align-items:center;justify-content:center;gap:10px;font-size:15px;line-height:1;font-weight:1000;text-decoration:none;cursor:pointer;font-family:inherit}
    .btn.back{color:var(--navy);background:#fff;box-shadow:0 10px 24px rgba(15,23,42,.045)}
    .btn.next{color:#fff;border-color:transparent;background:linear-gradient(135deg,var(--green),var(--green2));box-shadow:0 14px 30px rgba(7,148,63,.18)}
    @media(max-width:760px){.shell{width:calc(100% - 28px)}h1{white-space:normal}.questions{grid-template-columns:1fr}.bottom{flex-direction:column-reverse;align-items:stretch}.btn{width:100%;min-width:0}}
  </style>
</head>
<body>
  <main class="shell">
    <section aria-labelledby="trialTitle">
      <p class="kicker">SVT ENERGY NAVIGATOR</p>
      <h1 id="trialTitle">Alege întrebarea care te interesează cel mai mult</h1>
      <p class="subtitle" id="subtitle">Îți afișăm doar întrebările relevante pentru datele încărcate.</p>
      <div class="context" id="contextPills"></div>
    </section>

    <section class="questions" id="questions" aria-label="Întrebări disponibile"></section>

    <div class="info" id="infoBox"></div>

    <footer class="bottom">
      <a class="btn back" href="./incarcare-curba-sarcina.html">← Înapoi la date</a>
      <button class="btn next" type="button" id="continueBtn">Continuă ›</button>
    </footer>
  </main>

  <script>
    const allQuestions = [
      {id:1, icon:'📈', title:'Când consum din rețea energie scumpă?', groups:['electric'], active:true},
      {id:2, icon:'☀️', title:'Când nu valorific optim energia produsă local?', groups:['electric','pv']},
      {id:3, icon:'🌤️', title:'Cât va produce estimativ sistemul meu în următoarele 24 ore?', groups:['electric','pv','forecast']},
      {id:4, icon:'➕', title:'Câtă energie ar mai putea fi produsă local?', groups:['electric','pv','site']},
      {id:5, icon:'🔁', title:'Cât din energia suplimentar produsă ar fi utilizabilă util?', groups:['electric','pv']},
      {id:6, icon:'⏱️', title:'Ce consumuri aș putea muta în timp pentru că procesul tehnologic permite?', groups:['electric','thermal','flex']},
      {id:7, icon:'🔋', title:'Ce economie aș obține cu BESS, pompă de căldură, boiler, puffer sau cogenerare?', groups:['electric','thermal','investment']},
      {id:8, icon:'📊', title:'Ce economie aș obține astăzi pe consumurile reale dacă aș avea tarif dinamic PZU?', groups:['electric','pzu']},
      {id:9, icon:'🏗️', title:'Cât m-ar costa o investiție integrată care reduce costurile electrice și termice?', groups:['electric','thermal','investment']},
      {id:10, icon:'🎯', title:'Ce ar trebui să fac mâine pentru a reduce costul?', groups:['electric','thermal','forecast']}
    ];

    function getContext(){
      try { return JSON.parse(sessionStorage.getItem('svtNavigatorContext') || localStorage.getItem('svtNavigatorContext') || '{}'); }
      catch(e){ return {}; }
    }

    function relevantQuestions(ctx){
      const mode = ctx.selectedMode || 'electric';
      if(mode === 'termic'){
        return allQuestions.filter(q => q.groups.includes('thermal'));
      }
      return allQuestions.filter(q => q.groups.includes('electric'));
    }

    function render(){
      const ctx = getContext();
      const mode = ctx.selectedMode || 'electric';
      const questions = relevantQuestions(ctx);
      const grid = document.getElementById('questions');
      const pills = document.getElementById('contextPills');
      const info = document.getElementById('infoBox');

      const modeLabel = mode === 'termic' ? 'Termic' : 'Electric';
      const dataLabel = mode === 'termic'
        ? (ctx.thermal?.annualValue ? `Consum termic: ${ctx.thermal.annualValue} ${ctx.thermal.unit || ''}` : 'Date termice de bază')
        : (ctx.hasHourlyFile ? 'Curba orară încărcată' : ctx.hasInvoiceOnly ? 'Factură lunară / estimare' : 'Date electrice');
      const prodLabel = ctx.hasProduction ? 'Producție locală inclusă' : 'Fără producție locală';

      pills.innerHTML = `
        <span class="pill">${modeLabel}</span>
        <span class="pill">${dataLabel}</span>
        ${mode === 'electric' ? `<span class="pill">${prodLabel}</span>` : ''}
        ${ctx.fixedTariffRonKwh ? `<span class="pill">Tarif fix: ${Number(ctx.fixedTariffRonKwh).toLocaleString('ro-RO',{maximumFractionDigits:3})} lei/kWh</span>` : ''}
      `;

      grid.innerHTML = questions.map(q => {
        const isActive = q.id === 1 && mode === 'electric';
        return `
          <button class="q-card ${isActive ? 'available' : 'soon'}" type="button" data-q="${q.id}">
            <span class="q-no">${String(q.id).padStart(2,'0')}</span>
            <span class="q-ico">${q.icon}</span>
            <span class="q-title">${q.title}</span>
            ${isActive ? '<span class="check">✓</span>' : '<span class="badge">În curând</span>'}
          </button>
        `;
      }).join('');

      if(mode === 'termic'){
        info.textContent = 'Ai ales modul Termic. Din lista actuală, întrebările relevante sunt cele despre flexibilitate proces, pompă de căldură, boiler, puffer, cogenerare, investiție integrată și recomandări. Momentan sunt marcate „În curând”, pentru că întrebarea 1 este electrică.';
      } else {
        info.textContent = 'Ai ales modul Electric. Întrebarea 1 este disponibilă pe baza datelor încărcate. Restul întrebărilor electrice sunt afișate ca relevante, dar rămân momentan „În curând” până adăugăm datele suplimentare necesare.';
      }
    }

    // Momentan butonul Continuă nu face nimic, conform cerinței.
    document.getElementById('continueBtn')?.addEventListener('click', () => {});
    render();
  </script>
</body>
</html>
