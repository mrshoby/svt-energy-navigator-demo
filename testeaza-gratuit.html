<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Testează gratuit | SVT Energy Navigator</title>
  <meta name="description" content="Alege întrebarea care te interesează cel mai mult și începe analiza SVT Energy Navigator." />
  <link rel="stylesheet" href="./styles.css" />

  <style>
    :root{
      --svt-green:#07943f;
      --svt-green-2:#05aa48;
      --svt-green-soft:#e8f6ed;
      --svt-navy:#071826;
      --svt-text:#10203d;
      --svt-muted:#5b6b86;
      --svt-border:#dce5ef;
      --svt-shadow:0 16px 46px rgba(15,23,42,.075);
    }
    *{box-sizing:border-box}
    body.svt-trial-v311{
      margin:0!important;
      min-height:100vh;
      background:
        radial-gradient(circle at 76% 22%,rgba(7,148,63,.055),transparent 26%),
        radial-gradient(circle at 14% 86%,rgba(7,148,63,.075),transparent 28%),
        linear-gradient(180deg,#fff 0%,#fbfdfc 100%);
      color:var(--svt-text);
      font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
      overflow-x:hidden;
    }
    body.svt-trial-v311::after{
      content:"";
      position:fixed;
      left:-80px;right:-80px;bottom:-92px;height:210px;
      pointer-events:none;opacity:.18;
      background:repeating-radial-gradient(ellipse at center,rgba(7,148,63,.30) 0 1px,transparent 1px 9px);
      mask-image:linear-gradient(to top,#000,transparent 78%);
      transform:skewY(-3deg);
      z-index:0;
    }
    .svt-trial-shell{
      position:relative;
      z-index:1;
      width:min(1240px,calc(100% - 72px));
      min-height:100vh;
      margin:0 auto;
      padding:76px 0 42px;
      display:grid;
      grid-template-columns:1fr;
      gap:24px;
    }
    .svt-trial-head{
      max-width:1120px;
    }
    .svt-trial-kicker{
      margin:0 0 20px;
      color:var(--svt-green);
      font-size:15px;
      line-height:1;
      letter-spacing:.13em;
      text-transform:uppercase;
      font-weight:1000;
    }
    .svt-trial-title{
      margin:0;
      color:var(--svt-navy);
      font-size:clamp(42px,4.75vw,72px);
      line-height:1.02;
      letter-spacing:-.068em;
      font-weight:1000;
      white-space:nowrap;
    }
    .svt-trial-subtitle{
      margin:22px 0 0;
      color:var(--svt-muted);
      font-size:21px;
      line-height:1.45;
      font-weight:520;
      letter-spacing:-.012em;
      white-space:nowrap;
    }
    .svt-trial-options{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:10px 22px;
      margin-top:0;
    }
    .svt-option-card{
      position:relative;
      min-height:86px;
      width:100%;
      padding:14px 58px 14px 160px;
      border:1px solid #e0e8f1;
      border-radius:15px;
      background:rgba(255,255,255,.93);
      box-shadow:var(--svt-shadow);
      display:flex;
      align-items:center;
      text-align:left;
      color:var(--svt-navy);
      transition:transform .16s ease,border-color .16s ease,box-shadow .16s ease,background .16s ease;
      overflow:hidden;
    }
    .svt-option-card.is-active{
      border-color:var(--svt-green);
      background:linear-gradient(135deg,rgba(7,148,63,.085),rgba(255,255,255,.98));
      cursor:pointer;
      box-shadow:0 18px 50px rgba(7,148,63,.11);
    }
    .svt-option-card.is-active:hover{
      transform:translateY(-2px);
      box-shadow:0 22px 58px rgba(7,148,63,.14);
    }
    .svt-option-card.is-disabled{
      cursor:not-allowed;
      opacity:.76;
      filter:saturate(.82);
    }
    .svt-option-card.is-disabled::after{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(90deg,rgba(255,255,255,.14),rgba(255,255,255,.42));
      pointer-events:none;
    }
    .svt-option-number{
      position:absolute;
      left:28px;
      top:50%;
      transform:translateY(-50%);
      width:42px;height:42px;border-radius:999px;
      display:grid;place-items:center;
      background:#fff;
      border:1px solid #e1e9f2;
      color:var(--svt-green);
      font-size:16px;
      font-weight:1000;
      font-variant-numeric:tabular-nums;
      box-shadow:0 7px 18px rgba(15,23,42,.045);
    }
    .svt-option-icon{
      position:absolute;
      left:84px;
      top:50%;
      transform:translateY(-50%);
      width:58px;height:58px;border-radius:999px;
      display:grid;place-items:center;
      color:var(--svt-green);
      background:var(--svt-green-soft);
    }
    .svt-option-icon svg{
      width:30px;height:30px;
      stroke:currentColor;
      stroke-width:2.05;
      stroke-linecap:round;
      stroke-linejoin:round;
      fill:none;
    }
    .svt-option-title{
      display:block;
      color:var(--svt-navy);
      font-size:18px;
      line-height:1.18;
      letter-spacing:-.022em;
      font-weight:1000;
      white-space:normal;
    }
    .svt-option-arrow,.svt-option-check{
      position:absolute;
      right:24px;
      top:50%;
      transform:translateY(-50%);
      z-index:2;
    }
    .svt-option-arrow{
      color:#213552;
      font-size:31px;
      line-height:1;
      font-weight:400;
      opacity:.9;
    }
    .svt-option-check{
      width:30px;height:30px;border-radius:999px;
      display:grid;place-items:center;
      background:var(--svt-green);
      color:#fff;
      font-size:17px;
      font-weight:1000;
      box-shadow:0 9px 20px rgba(7,148,63,.22);
    }
    .svt-soon-badge{
      position:absolute;
      right:54px;
      top:50%;
      transform:translateY(-50%);
      z-index:3;
      height:27px;
      padding:0 11px;
      border-radius:999px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      background:#eef8f1;
      border:1px solid #cfeadb;
      color:var(--svt-green);
      font-size:11px;
      line-height:1;
      font-weight:1000;
      letter-spacing:.01em;
      white-space:nowrap;
    }
    .svt-trial-bottom{
      margin-top:10px;
      padding-top:24px;
      border-top:1px solid #e4ebf2;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:20px;
    }
    .svt-bottom-btn{
      width:210px;min-width:210px;height:58px;
      border-radius:12px;
      border:1px solid var(--svt-border);
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:12px;
      font-size:17px;
      line-height:1;
      font-weight:1000;
      text-decoration:none;
      cursor:pointer;
      font-family:inherit;
    }
    .svt-bottom-btn.back{
      color:var(--svt-navy);
      background:rgba(255,255,255,.94);
      box-shadow:0 13px 30px rgba(15,23,42,.055);
    }
    .svt-bottom-btn.next{
      color:#fff;
      border-color:transparent;
      background:linear-gradient(135deg,var(--svt-green),var(--svt-green-2));
      box-shadow:0 16px 36px rgba(7,148,63,.22);
    }
    @media(max-width:1100px){
      .svt-trial-title,.svt-trial-subtitle{white-space:normal}
      .svt-trial-options{grid-template-columns:1fr}
    }
    @media(max-width:620px){
      .svt-trial-shell{width:calc(100% - 28px);padding-top:36px}
      .svt-trial-title{font-size:clamp(36px,11vw,54px)}
      .svt-trial-subtitle{font-size:17px}
      .svt-option-card{min-height:78px;padding:12px 48px 12px 118px}
      .svt-option-number{left:15px;width:36px;height:36px;font-size:13px}
      .svt-option-icon{left:58px;width:48px;height:48px}
      .svt-option-icon svg{width:25px;height:25px}
      .svt-option-title{font-size:15px}
      .svt-soon-badge{right:42px;top:16px;transform:none}
      .svt-trial-bottom{flex-direction:column-reverse;align-items:stretch}
      .svt-bottom-btn{width:100%;min-width:0}
    }
  </style>
</head>

<body class="svt-trial-v311">
  <main class="svt-trial-shell">
    <section class="svt-trial-head" aria-labelledby="trialTitle">
      <p class="svt-trial-kicker">SVT ENERGY NAVIGATOR</p>
      <h1 class="svt-trial-title" id="trialTitle">Alege întrebarea care te interesează cel mai mult</h1>
      <p class="svt-trial-subtitle">Începem cu un singur obiectiv, apoi construim analiza pas cu pas.</p>
    </section>

    <section class="svt-trial-options" aria-label="Întrebări disponibile">
      <button class="svt-option-card is-active" type="button" aria-pressed="true" data-target="./incarcare-curba-sarcina.html">
        <span class="svt-option-number">01</span>
        <span class="svt-option-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M4 19V5"/><path d="M4 19h16"/><path d="m7 15 4-5 3 3 5-7"/><path d="M17 6h2v2"/></svg></span>
        <span class="svt-option-title">Când consum energie scumpă din rețea?</span>
        <span class="svt-option-check" aria-hidden="true">✓</span>
      </button>

      <button class="svt-option-card is-disabled" type="button" disabled><span class="svt-option-number">02</span><span class="svt-option-icon"><svg viewBox="0 0 24 24"><path d="M3 11 12 4l9 7"/><path d="M5 10v9h14v-9"/><path d="M9 19v-6h6v6"/><path d="M8 21h8"/></svg></span><span class="svt-option-title">Când nu valorific optim energia produsă local?</span><span class="svt-soon-badge">În curând</span><span class="svt-option-arrow">›</span></button>
      <button class="svt-option-card is-disabled" type="button" disabled><span class="svt-option-number">03</span><span class="svt-option-icon"><svg viewBox="0 0 24 24"><path d="M8 2v4"/><path d="M16 2v4"/><path d="M3 10h18"/><path d="M5 5h14v16H5z"/><path d="M14 14h4"/><path d="M16 12v4"/></svg></span><span class="svt-option-title">Cât va produce estimativ sistemul meu în următoarele 24 ore?</span><span class="svt-soon-badge">În curând</span><span class="svt-option-arrow">›</span></button>
      <button class="svt-option-card is-disabled" type="button" disabled><span class="svt-option-number">04</span><span class="svt-option-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/><path d="M12 8v8"/><path d="M8 12h8"/></svg></span><span class="svt-option-title">Câtă energie aș mai putea produce local?</span><span class="svt-soon-badge">În curând</span><span class="svt-option-arrow">›</span></button>
      <button class="svt-option-card is-disabled" type="button" disabled><span class="svt-option-number">05</span><span class="svt-option-icon"><svg viewBox="0 0 24 24"><path d="M12 3v9h9"/><path d="M21 12A9 9 0 1 1 12 3"/><path d="M16 4.5a9 9 0 0 1 4.5 4.5"/></svg></span><span class="svt-option-title">Cât din energia suplimentar produsă ar fi utilizabilă?</span><span class="svt-soon-badge">În curând</span><span class="svt-option-arrow">›</span></button>
      <button class="svt-option-card is-disabled" type="button" disabled><span class="svt-option-number">06</span><span class="svt-option-icon"><svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 4v6h6"/><path d="M12 7v5l4 2"/></svg></span><span class="svt-option-title">Ce consumuri aș putea muta în timp?</span><span class="svt-soon-badge">În curând</span><span class="svt-option-arrow">›</span></button>
      <button class="svt-option-card is-disabled" type="button" disabled><span class="svt-option-number">07</span><span class="svt-option-icon"><svg viewBox="0 0 24 24"><rect x="8" y="3" width="8" height="18" rx="1.8"/><path d="M10 7h4"/><path d="M10 17h4"/><path d="M12 10v4"/><path d="M10.5 12h3"/></svg></span><span class="svt-option-title">Ce economie aș obține cu BESS, pompă de căldură, boiler, puffer sau cogenerare?</span><span class="svt-soon-badge">În curând</span><span class="svt-option-arrow">›</span></button>
      <button class="svt-option-card is-disabled" type="button" disabled><span class="svt-option-number">08</span><span class="svt-option-icon"><svg viewBox="0 0 24 24"><path d="M4 19V5"/><path d="M4 19h16"/><path d="m7 16 4-5 3 3 5-8"/></svg></span><span class="svt-option-title">Ce economie aș obține astăzi cu tarif dinamic PZU?</span><span class="svt-soon-badge">În curând</span><span class="svt-option-arrow">›</span></button>
      <button class="svt-option-card is-disabled" type="button" disabled><span class="svt-option-number">09</span><span class="svt-option-icon"><svg viewBox="0 0 24 24"><path d="M4 19h16"/><rect x="6" y="11" width="3" height="8"/><rect x="11" y="7" width="3" height="12"/><rect x="16" y="3" width="3" height="16"/><path d="m16 3 3 3"/></svg></span><span class="svt-option-title">Cât m-ar costa o investiție integrată pentru reducerea costurilor electrice și termice?</span><span class="svt-soon-badge">În curând</span><span class="svt-option-arrow">›</span></button>
      <button class="svt-option-card is-disabled" type="button" disabled><span class="svt-option-number">10</span><span class="svt-option-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="3"/><path d="M12 2v3"/><path d="M22 12h-3"/><path d="M12 22v-3"/><path d="M2 12h3"/></svg></span><span class="svt-option-title">Ce ar trebui să fac mâine pentru a reduce costul?</span><span class="svt-soon-badge">În curând</span><span class="svt-option-arrow">›</span></button>
    </section>

    <footer class="svt-trial-bottom">
      <a class="svt-bottom-btn back" href="./index.html">← Pagina principală</a>
      <button class="svt-bottom-btn next" type="button" id="svtContinueBtn">Continuă ›</button>
    </footer>
  </main>

  <script>
    document.getElementById('svtContinueBtn')?.addEventListener('click', () => {
      window.location.href = './incarcare-curba-sarcina.html';
    });
  </script>
</body>
</html>
